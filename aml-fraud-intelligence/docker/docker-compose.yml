services:
  # ── Redis 7 (hot-path velocity cache) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [aml-network]

  # ── Kafka (Confluent cp-kafka 7.6.1, KRaft, no Zookeeper) ───────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    environment:
      CLUSTER_ID: ylKFFFIyR7WnD_SMOjYH6g
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks: [aml-network]

  # ── Neo4j 5 + Graph Data Science plugin ─────────────────────────────────────
  # Intentionally NO env_file — only the six Neo4j vars below (avoid leaking .env).
  neo4j:
    image: neo4j:5.18-enterprise
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [aml-network]

  # ── Streamlit dashboard (Phase 7) ───────────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: >
      bash -c "pip install --quiet streamlit plotly pyvis requests python-dotenv pandas
      && streamlit run dashboard/Home.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    env_file: ../.env
    environment:
      BACKEND_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
      - redis
      - neo4j
    networks: [aml-network]

volumes:
  neo4jdata:
  neo4jlogs:

networks:
  aml-network:
    driver: bridge
